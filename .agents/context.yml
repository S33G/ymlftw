---
context:
  domain: "payments processing"

  glossary:
    idempotency_key: "unique string per transaction to prevent duplicate charges"
    settlement: "process of moving funds from pending to available balance"
    chargeback: "forced reversal of a charge, initiated by the card issuer"

  invariants:
    - "Monetary values are always integers (cents) — never floats"
    - "Never mutate a completed or refunded transaction"
    - "All external API calls must be idempotent"

  external_services:
    - name: "Stripe"
      url: "https://stripe.com/docs/api"
      notes: "Primary payment gateway. Use API v2 only."
    - name: "SendGrid"
      url: "https://docs.sendgrid.com"
      notes: "Transactional email. Templates managed in SendGrid UI."

runbooks:
  on_call:
    - "Check Datadog dashboard before any action"
    - "If DB replication lag > 5s, page the db-team"
    - "For Stripe webhook failures, check the webhook log in Stripe dashboard first"
  common_errors:
    ECONNREFUSED: "Redis is likely down — check pod status in k8s"
    OOM_KILLED: "Increase memory limit in helm/values.production.yaml"
    STRIPE_RATE_LIMIT: "Back off exponentially — Stripe rate limits at 100 req/s"
  escalation:
    p1: "page on-call via PagerDuty"
    p2: "post in #myproj-incidents Slack channel"
